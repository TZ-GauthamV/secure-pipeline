name: Secure Pipeline

on:
  push:
  pull_request:

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 🔐 Secret Scanning
      - name: Run Gitleaks (Secret Scan)
        uses: gitleaks/gitleaks-action@v2

      # 📦 Install Trivy (FIXED VERSION)
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget https://github.com/aquasecurity/trivy/releases/download/v0.70.0/trivy_0.70.0_Linux-64bit.deb
          sudo dpkg -i trivy_0.70.0_Linux-64bit.deb

      # 🧪 Scan filesystem for vulnerabilities
      - name: Scan Repository (Trivy FS)
        run: trivy fs . --exit-code 1 --severity CRITICAL

      # 🐳 Build Docker image
      - name: Build Docker Image
        run: docker build -t secure-app .

      # 🚨 Scan Docker image
      - name: Scan Docker Image (Trivy)
        run: trivy image secure-app --exit-code 1 --severity CRITICAL
